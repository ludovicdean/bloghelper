name: CI/CD Bloghelper GHCR
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install deps
      run: npm install
    
    - name: Build Angular
      run: npm run build  # Crée dist/
    
    - name: Setup Docker
      uses: docker/setup-buildx-action@v3
    
    - name: Login GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build & Push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/bloghelper:latest
    
    - name: Deploy Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}  # 192.168.1.105 LOCAL !
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker stop bloghelper-app || true
          docker rm bloghelper-app || true
          docker pull ghcr.io/${{ github.repository_owner }}/bloghelper:latest
          docker run -d --restart unless-stopped --name bloghelper-app -p 8080:80 ghcr.io/${{ github.repository_owner }}/bloghelper:latest