name: CI/CD Bloghelper
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Build Angular
      run: npm run build
    
    - name: Build Docker
      run: docker build -t bloghelper .
    
    - name: Save Docker image
      run: docker save bloghelper -o bloghelper.tar
    
    - name: Copy image to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "bloghelper.tar"
        target: "/home/ludo/"
    
    - name: Deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        args: '-o StrictHostKeyChecking=no'
        script: |
          cd /home/ludo
          docker stop bloghelper-app || true
          docker rm bloghelper-app || true
          docker load -i bloghelper.tar
          docker run -d --restart unless-stopped --name bloghelper-app -p 8080:80 bloghelper
          rm bloghelper.tar